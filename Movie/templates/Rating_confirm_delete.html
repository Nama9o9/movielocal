{% extends 'base.html' %}

{% block title %}Bewertung löschen{% endblock %}

{% block content %}
    <h1>Bewertung wirklich löschen?</h1>
    <p>{{ object.get_text_prefix }} ({{ object.stars }} Sterne)</p>
    <form method="post" style="display: flex; gap: 1.25rem;">
        {% csrf_token %}
        <button type="submit" class="btn btn-medium">Ja, löschen</button>
        <a class="back-link" style="margin: 0;" href="{% url 'movie_detail' pk=object.movie.pk %}">Abbrechen</a>
    </form>
{% endblock %}
