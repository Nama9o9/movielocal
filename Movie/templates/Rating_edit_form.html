{% extends 'base.html' %}

{% block title %}Bewertung bearbeiten{% endblock %}

{% block content %}
    <h1>Bewertung bearbeiten</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-medium">Speichern</button>
    </form>
    <a class="back-link" href="{% url 'movie_detail' pk=object.movie.pk %}">← Abbrechen</a>
{% endblock %}
