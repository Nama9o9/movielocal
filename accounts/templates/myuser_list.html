{% extends 'home.html' %}

{% block title %}Users list{% endblock %}

{% block content %}
<h2>Users list</h2>
<ul>
    {% for myuser in all_myusers %}
        {{ myuser.first_name }} {{ myuser.last_name }} <br>
        {% if myuser.profile_picture %} <!-- need this for MySql to work -->
            <img src="{{ myuser.profile_pic.url }}" height="150" width="150"><br>
        {% endif %}
        <br>
    {% endfor %}
</ul>
{% endblock %}
