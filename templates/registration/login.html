{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>You do not have an Account yet? <a href="{% url 'signup' %}">Sign Up here!</a></p>
{% endblock %}
