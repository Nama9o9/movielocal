{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Movies{% endblock %}</title>
</head>
<body>
    <header>
        {% if user.is_authenticated %}
            <a style="float: right;" href="{% url 'shopping_cart_show' %}">
                Shopping Cart ({{ user.shopping_cart_item_count }})
            </a>
            <a href="{% url 'profile' %}">Mein Profil</a>
        {% else %}
            <a style="float: right;" href="{% url 'shopping_cart_show' %}">
                Shopping Cart (0)
            </a>
        {% endif %}
    </header>
    <nav>
        <a href="{% url 'home' %}"> Home</a>
    </nav>
    {% block content %}
    {% endblock %}
</body>
</html>
